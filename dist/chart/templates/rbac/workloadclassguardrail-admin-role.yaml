{{- if .Values.rbacHelpers.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "workload-class.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  name: {{ include "workload-class.resourceName" (dict "suffix" "workloadclassguardrail-admin-role" "context" $) }}
rules:
- apiGroups:
  - workloads.gke.io
  resources:
  - workloadclassguardrails
  verbs:
  - '*'
- apiGroups:
  - workloads.gke.io
  resources:
  - workloadclassguardrails/status
  verbs:
  - get
{{- end }}
