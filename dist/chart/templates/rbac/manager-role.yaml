apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.rbac.namespaced }}
kind: Role
{{- else }}
kind: ClusterRole
{{- end }}
metadata:
{{- if .Values.rbac.namespaced }}
  namespace: {{ .Release.Namespace }}
{{- end }}
  name: {{ include "workload-class.resourceName" (dict "suffix" "manager-role" "context" $) }}
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - namespaces
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - workloads.gke.io
  resources:
  - workloadclasses
  - workloadclassguardrails
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - workloads.gke.io
  resources:
  - workloadclasses/finalizers
  - workloadclassguardrails/finalizers
  verbs:
  - update
- apiGroups:
  - workloads.gke.io
  resources:
  - workloadclasses/status
  - workloadclassguardrails/status
  verbs:
  - get
  - patch
  - update
