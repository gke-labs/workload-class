---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-workloads-gke-io-v1-workloadclass
  failurePolicy: Fail
  name: mworkloadclass-v1.kb.io
  rules:
  - apiGroups:
    - workloads.gke.io
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - workloadclasses
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-disruption
  failurePolicy: Fail
  name: vpoddisruption.gke.io
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    - DELETE
    resources:
    - pods
    - pods/eviction
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-workloads-gke-io-v1-workloadclass
  failurePolicy: Fail
  name: vworkloadclass-v1.kb.io
  rules:
  - apiGroups:
    - workloads.gke.io
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - workloadclasses
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-workloads-gke-io-v1-workloadclassguardrail
  failurePolicy: Fail
  name: vworkloadclassguardrail-v1.kb.io
  rules:
  - apiGroups:
    - workloads.gke.io
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - workloadclassguardrails
  sideEffects: None
