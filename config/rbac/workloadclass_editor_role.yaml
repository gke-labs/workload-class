# This rule is not used by the project workload-class itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the workloads.gke.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: workload-class
    app.kubernetes.io/managed-by: kustomize
  name: workloadclass-editor-role
rules:
- apiGroups:
  - workloads.gke.io
  resources:
  - workloadclasses
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - workloads.gke.io
  resources:
  - workloadclasses/status
  verbs:
  - get
