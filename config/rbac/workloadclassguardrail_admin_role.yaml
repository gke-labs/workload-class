# This rule is not used by the project workload-class itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over workloads.gke.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: workload-class
    app.kubernetes.io/managed-by: kustomize
  name: workloadclassguardrail-admin-role
rules:
- apiGroups:
  - workloads.gke.io
  resources:
  - workloadclassguardrails
  verbs:
  - '*'
- apiGroups:
  - workloads.gke.io
  resources:
  - workloadclassguardrails/status
  verbs:
  - get
